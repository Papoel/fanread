name: Security Audit
on: [ push, pull_request ]
jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2

      - name: Setup Cache
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Caching deps
        uses: actions/cache@v6
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php8.4-composer-${{ hashfiles('**/composer.json') }}
          restore-keys: |
            php8.4-composer-latest-

      - name: Update composer
        run: composer self-update

      - name: install deps
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader --ignore-platform-req=ext-amqp

      - name: security audit
        run: |
          composer audit \
            --no-dev \
            --abandoned="report" \
            --ignore-severity="low" \
            --ignore-severity="medium" \
            --format="json" \
            --no-ansi \
            > /tmp/security-audit.json

      - name: upload security audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-audit
          path: /tmp/security-audit.json
