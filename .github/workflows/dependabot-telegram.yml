# Secrets à créer dans : Settings → Secrets and variables → Dependabot
#   1. TELEGRAM_BOT_TOKEN  (via @BotFather)
#   2. TELEGRAM_CHAT_ID
# ⚠️ Ce sont des "Dependabot secrets", PAS des "Actions secrets" (voir tuto).

name: Notify Telegram on Dependabot PR

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
        run: |
          MESSAGE="🤖 *Dependabot* a ouvert une PR sur \`${REPO}\`
          ${PR_TITLE}
          ${PR_URL}"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "text=${MESSAGE}"
